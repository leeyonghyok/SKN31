            - text: in the standard library.
          - paragraph [ref=e58]:
            - text: The library changes include significantly improved capabilities for
            - link "introspection in asyncio" [ref=e59] [cursor=pointer]:
              - /url: "#whatsnew314-asyncio-introspection"
            - text: ","
            - link "support for Zstandard" [ref=e60] [cursor=pointer]:
