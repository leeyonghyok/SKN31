              - code [ref=e62]: compression.zstd
            - text: module, syntax highlighting in the REPL, as well as the usual deprecations and removals, and improvements in user-friendliness and correctness.
          - paragraph [ref=e63]:
            - text: This article doesn’t attempt to provide a complete specification of all new features, but instead gives a convenient overview. For full details refer to the documentation, such as the
            - link "Library Reference" [ref=e64] [cursor=pointer]:
