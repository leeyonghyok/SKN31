                - strong [ref=e3991]: PEP 587
              - text: ‘Python Initialization Configuration’ unified all the ways to configure Python’s initialization. This PEP also unifies the configuration of Python’s preinitialization and initialization in a single API. Moreover, this PEP only provides a single choice to embed Python, instead of having two ‘Python’ and ‘Isolated’ choices (PEP 587), to further simplify the API.
            - paragraph [ref=e3992]: The lower level PEP 587 PyConfig API remains available for use cases with an intentionally higher level of coupling to CPython implementation details (such as emulating the full functionality of CPython’s CLI, including its configuration mechanisms).
            - paragraph [ref=e3993]:
              - text: (Contributed by Victor Stinner in
              - link "gh-107954" [ref=e3994] [cursor=pointer]:
