            - paragraph [ref=e5095]:
              - text: The free-threaded build of Python is now supported and no longer experimental. This is the start of
              - link "phase II" [ref=e5096] [cursor=pointer]:
                - /url: https://discuss.python.org/t/37075
              - text: where free-threaded Python is officially supported but still optional.
            - paragraph [ref=e5097]: The free-threading team are confident that the project is on the right path, and appreciate the continued dedication from everyone working to make free-threading ready for broader adoption across the Python community.
            - paragraph [ref=e5098]: With these recommendations and the acceptance of this PEP, the Python developer community should broadly advertise that free-threading is a supported Python build option now and into the future, and that it will not be removed without a proper deprecation schedule.
            - paragraph [ref=e5099]:
              - text: Any decision to transition to
              - link "phase III" [ref=e5100] [cursor=pointer]:
                - /url: https://discuss.python.org/t/37075
              - text: ", with free-threading as the default or sole build of Python is still undecided, and dependent on many factors both within CPython itself and the community. This decision is for the future."
