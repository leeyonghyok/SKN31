                        - code [ref=e2195]: types.UnionType
                      - text: is itself much smaller than the object returned by
                      - code [ref=e2196]: Union[]
                      - text: was on prior Python versions; and removing the cache also saves some space. It is therefore unlikely that this change will cause a significant increase in memory usage for most users.
                  - listitem [ref=e2197]:
                    - paragraph [ref=e2198]:
                      - text: Previously, old-style unions were implemented using the private class
