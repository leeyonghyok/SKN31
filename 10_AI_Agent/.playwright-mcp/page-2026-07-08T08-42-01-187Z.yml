                  - code [ref=e5256]: annotationlib
                - text: module.
              - paragraph [ref=e5257]:
                - text: In particular, do not read annotations directly from the namespace dictionary attribute of type objects. Use
                - link "annotationlib.get_annotate_from_class_namespace()" [ref=e5258] [cursor=pointer]:
