                  - code [ref=e5261]: annotationlib.get_annotations()
                - text: afterwards.
              - paragraph [ref=e5262]: In previous releases, it was sometimes possible to access class annotations from an instance of an annotated class. This behavior was undocumented and accidental, and will no longer work in Python 3.14.
            - generic [ref=e5263]:
