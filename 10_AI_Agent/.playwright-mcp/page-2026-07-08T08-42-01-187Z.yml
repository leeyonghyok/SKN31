                      - code [ref=e2189]: ==
                      - text: to compare unions for equality, not
                      - code [ref=e2190]: is
                      - text: . New-style unions have never been cached this way. This change could increase memory usage for some programs that use a large number of unions created by subscripting
                      - code [ref=e2191]: typing.Union
                      - text: ". However, several factors offset this cost: unions used in annotations are no longer evaluated by default in Python 3.14 because of"
