                  - code [ref=e2175]: int | str
                  - text: ") now create instances of the same runtime type. This unifies the behavior between the two syntaxes, but leads to some differences in behavior that may affect users who introspect types at runtime:"
                - list [ref=e2176]:
                  - listitem [ref=e2177]:
                    - paragraph [ref=e2178]:
                      - text: Both syntaxes for creating a union now produce the same string representation in
