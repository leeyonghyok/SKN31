                - text: opcode with the
                - code [ref=e3866]: NB_SUBSCR
                - text: oparg. (Contributed by Irit Katriel in
                - link "gh-100239" [ref=e3867] [cursor=pointer]:
                  - /url: https://github.com/python/cpython/issues/100239
                - text: .)
            - listitem [ref=e3868]:
              - paragraph [ref=e3869]:
                - text: Add the
                - link "BUILD_INTERPOLATION" [ref=e3870] [cursor=pointer]:
                  - /url: ../library/dis.html#opcode-BUILD_INTERPOLATION
                  - code [ref=e3871]: BUILD_INTERPOLATION
                - text: and
                - link "BUILD_TEMPLATE" [ref=e3872] [cursor=pointer]:
                  - /url: ../library/dis.html#opcode-BUILD_TEMPLATE
                  - code [ref=e3873]: BUILD_TEMPLATE
                - text: opcodes to construct new
                - link "Interpolation" [ref=e3874] [cursor=pointer]:
                  - /url: ../library/string.templatelib.html#string.templatelib.Interpolation
                  - code [ref=e3875]: Interpolation
                - text: and
                - link "Template" [ref=e3876] [cursor=pointer]:
                  - /url: ../library/string.templatelib.html#string.templatelib.Template
                  - code [ref=e3877]: Template
                - text: instances, respectively. (Contributed by Lysandros Nikolaou and others in
                - link "gh-132661" [ref=e3878] [cursor=pointer]:
                  - /url: https://github.com/python/cpython/issues/132661
                - text: ; see also
                - 'link "PEP 750: Template strings" [ref=e3879] [cursor=pointer]':
                  - /url: "#whatsnew314-template-string-literals"
                - text: ).
            - listitem [ref=e3880]:
              - paragraph [ref=e3881]:
                - text: Remove the
                - code [ref=e3882]: BUILD_CONST_KEY_MAP
                - text: opcode. Use
                - link "BUILD_MAP" [ref=e3883] [cursor=pointer]:
                  - /url: ../library/dis.html#opcode-BUILD_MAP
                  - code [ref=e3884]: BUILD_MAP
                - text: instead. (Contributed by Mark Shannon in
                - link "gh-122160" [ref=e3885] [cursor=pointer]:
                  - /url: https://github.com/python/cpython/issues/122160
                - text: .)
            - listitem [ref=e3886]:
              - paragraph [ref=e3887]:
                - text: Replace the
                - code [ref=e3888]: LOAD_ASSERTION_ERROR
                - text: opcode with
                - link "LOAD_COMMON_CONSTANT" [ref=e3889] [cursor=pointer]:
                  - /url: ../library/dis.html#opcode-LOAD_COMMON_CONSTANT
                  - code [ref=e3890]: LOAD_COMMON_CONSTANT
                - text: and add support for loading
                - link "NotImplementedError" [ref=e3891] [cursor=pointer]:
                  - /url: ../library/exceptions.html#NotImplementedError
                  - code [ref=e3892]: NotImplementedError
                - text: .
            - listitem [ref=e3893]:
              - paragraph [ref=e3894]:
                - text: Add the
                - link "LOAD_FAST_BORROW" [ref=e3895] [cursor=pointer]:
                  - /url: ../library/dis.html#opcode-LOAD_FAST_BORROW
                  - code [ref=e3896]: LOAD_FAST_BORROW
                - text: and
                - link "LOAD_FAST_BORROW_LOAD_FAST_BORROW" [ref=e3897] [cursor=pointer]:
                  - /url: ../library/dis.html#opcode-LOAD_FAST_BORROW_LOAD_FAST_BORROW
                  - code [ref=e3898]: LOAD_FAST_BORROW_LOAD_FAST_BORROW
                - text: opcodes to reduce reference counting overhead when the interpreter can prove that the reference in the frame outlives the reference loaded onto the stack. (Contributed by Matt Page in
                - link "gh-130704" [ref=e3899] [cursor=pointer]:
                  - /url: https://github.com/python/cpython/issues/130704
                - text: .)
            - listitem [ref=e3900]:
              - paragraph [ref=e3901]:
                - text: Add the
                - link "LOAD_SMALL_INT" [ref=e3902] [cursor=pointer]:
                  - /url: ../library/dis.html#opcode-LOAD_SMALL_INT
                  - code [ref=e3903]: LOAD_SMALL_INT
                - text: opcode, which pushes a small integer equal to the
                - code [ref=e3904]: oparg
                - text: to the stack. The
                - code [ref=e3905]: RETURN_CONST
                - text: opcode is removed as it is no longer used. (Contributed by Mark Shannon in
                - link "gh-125837" [ref=e3906] [cursor=pointer]:
                  - /url: https://github.com/python/cpython/issues/125837
                - text: .)
            - listitem [ref=e3907]:
              - paragraph [ref=e3908]:
                - text: Add the new
                - link "LOAD_SPECIAL" [ref=e3909] [cursor=pointer]:
                  - /url: ../library/dis.html#opcode-LOAD_SPECIAL
                  - code [ref=e3910]: LOAD_SPECIAL
                - text: instruction. Generate code for
                - link "with" [ref=e3911] [cursor=pointer]:
                  - /url: ../reference/compound_stmts.html#with
                  - code [ref=e3912]: with
                - text: and
                - link "async with" [ref=e3913] [cursor=pointer]:
