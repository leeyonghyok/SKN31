          - paragraph [ref=e54]:
            - text: Python 3.14 is the latest stable release of the Python programming language, with a mix of changes to the language, the implementation, and the standard library. The biggest changes include
            - link "template string literals" [ref=e55] [cursor=pointer]:
              - /url: "#whatsnew314-template-string-literals"
            - text: ","
            - link "deferred evaluation of annotations" [ref=e56] [cursor=pointer]:
