        - generic [ref=e164]:
          - heading "New features" [level=2] [ref=e165]
          - generic [ref=e166]:
            - 'heading "PEP 649 & PEP 749: Deferred evaluation of annotations" [level=3] [ref=e167]':
              - link "PEP 649" [ref=e168] [cursor=pointer]:
                - /url: https://peps.python.org/pep-0649/
                - strong [ref=e169]: PEP 649
              - text: "&"
              - link "PEP 749" [ref=e170] [cursor=pointer]:
                - /url: https://peps.python.org/pep-0749/
                - strong [ref=e171]: PEP 749
              - text: ": Deferred evaluation of annotations"
            - paragraph [ref=e172]:
              - text: The
              - link "annotations" [ref=e173] [cursor=pointer]:
                - /url: ../glossary.html#term-annotation
              - text: on functions, classes, and modules are no longer evaluated eagerly. Instead, annotations are stored in special-purpose
              - link "annotate functions" [ref=e174] [cursor=pointer]:
                - /url: ../glossary.html#term-annotate-function
              - text: and evaluated only when necessary (except if
              - code [ref=e175]: from __future__ import annotations
              - text: is used).
            - paragraph [ref=e176]: This change is designed to improve performance and usability of annotations in Python in most circumstances. The runtime cost for defining annotations is minimized, but it remains possible to introspect annotations at runtime. It is no longer necessary to enclose annotations in strings if they contain forward references.
            - paragraph [ref=e177]:
              - text: The new
              - link "annotationlib" [ref=e178] [cursor=pointer]:
                - /url: ../library/annotationlib.html#module-annotationlib
                - code [ref=e179]: annotationlib
              - text: module provides tools for inspecting deferred annotations. Annotations may be evaluated in the
              - link "VALUE" [ref=e180] [cursor=pointer]:
                - /url: ../library/annotationlib.html#annotationlib.Format.VALUE
                - code [ref=e181]: VALUE
              - text: format (which evaluates annotations to runtime values, similar to the behavior in earlier Python versions), the
              - link "FORWARDREF" [ref=e182] [cursor=pointer]:
                - /url: ../library/annotationlib.html#annotationlib.Format.FORWARDREF
                - code [ref=e183]: FORWARDREF
              - text: format (which replaces undefined names with special markers), and the
              - link "STRING" [ref=e184] [cursor=pointer]:
                - /url: ../library/annotationlib.html#annotationlib.Format.STRING
                - code [ref=e185]: STRING
              - text: format (which returns annotations as strings).
            - paragraph [ref=e186]: "This example shows how these formats behave:"
            - generic [ref=e189]: ">>> from annotationlib import get_annotations, Format >>> def func(arg: Undefined): ... pass >>> get_annotations(func, format=Format.VALUE) Traceback (most recent call last): ... NameError: name 'Undefined' is not defined >>> get_annotations(func, format=Format.FORWARDREF) {'arg': ForwardRef('Undefined', owner=<function func at 0x...>)} >>> get_annotations(func, format=Format.STRING) {'arg': 'Undefined'}"
            - paragraph [ref=e190]:
              - text: The
              - link "porting" [ref=e191] [cursor=pointer]:
                - /url: "#whatsnew314-porting-annotations"
              - text: section contains guidance on changes that may be needed due to these changes, though in the majority of cases, code will continue working as-is.
            - paragraph [ref=e192]:
              - text: (Contributed by Jelle Zijlstra in
              - link "PEP 749" [ref=e193] [cursor=pointer]:
                - /url: https://peps.python.org/pep-0749/
                - strong [ref=e194]: PEP 749
              - text: and
              - link "gh-119180" [ref=e195] [cursor=pointer]:
                - /url: https://github.com/python/cpython/issues/119180
              - text: ;
              - link "PEP 649" [ref=e196] [cursor=pointer]:
                - /url: https://peps.python.org/pep-0649/
                - strong [ref=e197]: PEP 649
              - text: was written by Larry Hastings.)
            - generic [ref=e198]:
              - paragraph [ref=e199]: "See also:"
              - generic [ref=e200]:
                - term [ref=e201]:
                  - link "PEP 649" [ref=e202] [cursor=pointer]:
                    - /url: https://peps.python.org/pep-0649/
                    - strong [ref=e203]: PEP 649
                - definition [ref=e204]:
                  - paragraph [ref=e205]: Deferred Evaluation Of Annotations Using Descriptors
                - term [ref=e206]:
                  - link "PEP 749" [ref=e207] [cursor=pointer]:
                    - /url: https://peps.python.org/pep-0749/
                    - strong [ref=e208]: PEP 749
                - definition [ref=e209]:
                  - paragraph [ref=e210]: Implementing PEP 649
          - generic [ref=e211]:
            - 'heading "PEP 734: Multiple interpreters in the standard library" [level=3] [ref=e212]':
              - link "PEP 734" [ref=e213] [cursor=pointer]:
                - /url: https://peps.python.org/pep-0734/
                - strong [ref=e214]: PEP 734
              - text: ": Multiple interpreters in the standard library"
            - paragraph [ref=e215]:
              - text: The CPython runtime supports running multiple copies of Python in the same process simultaneously and has done so for over 20 years. Each of these separate copies is called an ‘interpreter’. However, the feature had been available only through the
              - link "C-API" [ref=e216] [cursor=pointer]:
                - /url: ../c-api/subinterpreters.html#sub-interpreter-support
              - text: .
            - paragraph [ref=e217]:
              - text: That limitation is removed in Python 3.14, with the new
              - link "concurrent.interpreters" [ref=e218] [cursor=pointer]:
                - /url: ../library/concurrent.interpreters.html#module-concurrent.interpreters
                - code [ref=e219]: concurrent.interpreters
              - text: module.
            - paragraph [ref=e220]: "There are at least two notable reasons why using multiple interpreters has significant benefits:"
            - list [ref=e221]:
              - listitem [ref=e222]:
                - paragraph [ref=e223]: they support a new (to Python), human-friendly concurrency model
              - listitem [ref=e224]:
                - paragraph [ref=e225]: true multi-core parallelism
            - paragraph [ref=e226]:
              - text: For some use cases, concurrency in software improves efficiency and can simplify design, at a high level. At the same time, implementing and maintaining all but the simplest concurrency is often a struggle for the human brain. That especially applies to plain threads (for example,
              - link "threading" [ref=e227] [cursor=pointer]:
                - /url: ../library/threading.html#module-threading
                - code [ref=e228]: threading
              - text: ), where all memory is shared between all threads.
            - paragraph [ref=e229]: With multiple isolated interpreters, you can take advantage of a class of concurrency models, like Communicating Sequential Processes (CSP) or the actor model, that have found success in other programming languages, like Smalltalk, Erlang, Haskell, and Go. Think of multiple interpreters as threads but with opt-in sharing.
            - paragraph [ref=e230]:
              - text: "Regarding multi-core parallelism: as of Python 3.12, interpreters are now sufficiently isolated from one another to be used in parallel (see"
              - link "PEP 684" [ref=e231] [cursor=pointer]:
                - /url: https://peps.python.org/pep-0684/
                - strong [ref=e232]: PEP 684
              - text: ). This unlocks a variety of CPU-intensive use cases for Python that were limited by the
              - link "GIL" [ref=e233] [cursor=pointer]:
                - /url: ../glossary.html#term-GIL
              - text: .
            - paragraph [ref=e234]:
              - text: Using multiple interpreters is similar in many ways to
              - link "multiprocessing" [ref=e235] [cursor=pointer]:
                - /url: ../library/multiprocessing.html#module-multiprocessing
                - code [ref=e236]: multiprocessing
              - text: ", in that they both provide isolated logical “processes” that can run in parallel, with no sharing by default. However, when using multiple interpreters, an application will use fewer system resources and will operate more efficiently (since it stays within the same process). Think of multiple interpreters as having the isolation of processes with the efficiency of threads."
            - paragraph [ref=e237]: While the feature has been around for decades, multiple interpreters have not been used widely, due to low awareness and the lack of a standard library module. Consequently, they currently have several notable limitations, which are expected to improve significantly now that the feature is going mainstream.
            - paragraph [ref=e238]: "Current limitations:"
            - list [ref=e239]:
              - listitem [ref=e240]:
                - paragraph [ref=e241]: starting each interpreter has not been optimized yet
              - listitem [ref=e242]:
                - paragraph [ref=e243]: each interpreter uses more memory than necessary (work continues on extensive internal sharing between interpreters)
              - listitem [ref=e244]:
                - paragraph [ref=e245]:
                  - text: there aren’t many options
                  - emphasis [ref=e246]: yet
                  - text: for truly sharing objects or other data between interpreters (other than
                  - link "memoryview" [ref=e247] [cursor=pointer]:
                    - /url: ../library/stdtypes.html#memoryview
                    - code [ref=e248]: memoryview
                  - text: )
              - listitem [ref=e249]:
                - paragraph [ref=e250]:
                  - text: many third-party extension modules on PyPI are not yet compatible with multiple interpreters (all standard library extension modules
                  - emphasis [ref=e251]: are
                  - text: compatible)
              - listitem [ref=e252]:
                - paragraph [ref=e253]: the approach to writing applications that use multiple isolated interpreters is mostly unfamiliar to Python users, for now
            - paragraph [ref=e254]: The impact of these limitations will depend on future CPython improvements, how interpreters are used, and what the community solves through PyPI packages. Depending on the use case, the limitations may not have much impact, so try it out!
            - paragraph [ref=e255]:
              - text: Furthermore, future CPython releases will reduce or eliminate overhead and provide utilities that are less appropriate on PyPI. In the meantime, most of the limitations can also be addressed through extension modules, meaning PyPI packages can fill any gap for 3.14, and even back to 3.12 where interpreters were finally properly isolated and stopped sharing the
              - link "GIL" [ref=e256] [cursor=pointer]:
                - /url: ../glossary.html#term-GIL
              - text: . Likewise, libraries on PyPI are expected to emerge for high-level abstractions on top of interpreters.
            - paragraph [ref=e257]:
              - text: Regarding extension modules, work is in progress to update some PyPI projects, as well as tools like Cython, pybind11, nanobind, and PyO3. The steps for isolating an extension module are found at
              - link "Isolating Extension Modules" [ref=e258] [cursor=pointer]:
                - /url: ../howto/isolating-extensions.html#isolating-extensions-howto
              - text: . Isolating a module has a lot of overlap with what is required to support
              - link "free-threading" [ref=e259] [cursor=pointer]:
                - /url: "#whatsnew314-free-threaded-cpython"
              - text: ", so the ongoing work in the community in that area will help accelerate support for multiple interpreters."
            - paragraph [ref=e260]:
              - text: "Also added in 3.14:"
              - link "concurrent.futures.InterpreterPoolExecutor" [ref=e261] [cursor=pointer]:
                - /url: "#whatsnew314-concurrent-futures-interp-pool"
              - text: .
            - paragraph [ref=e262]:
              - text: (Contributed by Eric Snow in
              - link "gh-134939" [ref=e263] [cursor=pointer]:
                - /url: https://github.com/python/cpython/issues/134939
              - text: .)
            - generic [ref=e264]:
              - paragraph [ref=e265]: "See also:"
              - paragraph [ref=e266]:
                - link "PEP 734" [ref=e267] [cursor=pointer]:
                  - /url: https://peps.python.org/pep-0734/
                  - strong [ref=e268]: PEP 734
          - generic [ref=e269]:
            - 'heading "PEP 750: Template string literals" [level=3] [ref=e270]':
              - link "PEP 750" [ref=e271] [cursor=pointer]:
                - /url: https://peps.python.org/pep-0750/
                - strong [ref=e272]: PEP 750
              - text: ": Template string literals"
            - paragraph [ref=e273]:
              - text: Template strings are a new mechanism for custom string processing. They share the familiar syntax of f-strings but, unlike f-strings, return an object representing the static and interpolated parts of the string, instead of a simple
              - link "str" [ref=e274] [cursor=pointer]:
