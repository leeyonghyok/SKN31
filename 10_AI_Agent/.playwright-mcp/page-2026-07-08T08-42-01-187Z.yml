          - generic [ref=e745]:
            - heading "Garbage collection" [level=3] [ref=e746]
            - paragraph [ref=e747]:
              - strong [ref=e748]: "From Python 3.14.5 onwards:"
            - paragraph [ref=e749]: The garbage collector (GC) has changed in Python 3.14.5.
            - paragraph [ref=e750]:
              - text: Python 3.14.0-3.14.4 shipped with a new incremental GC. However, due to a number of
              - link "reports" [ref=e751] [cursor=pointer]:
                - /url: https://github.com/python/cpython/issues/142516
              - text: of significant memory pressure in production environments, it has been reverted back to the generational GC from 3.13. This is the GC now used in Python 3.14.5 and later.
            - paragraph [ref=e752]:
              - strong [ref=e753]: "Previously in Python 3.14.0-3.14.4:"
            - paragraph [ref=e754]: The cycle garbage collector is now incremental. This means that maximum pause times are reduced by an order of magnitude or more for larger heaps.
            - paragraph [ref=e755]:
              - text: "There are now only two generations: young and old. When"
              - link "gc.collect()" [ref=e756] [cursor=pointer]:
                - /url: ../library/gc.html#gc.collect
                - code [ref=e757]: gc.collect()
              - text: is not called directly, the GC is invoked a little less frequently. When invoked, it collects the young generation and an increment of the old generation, instead of collecting one or more generations.
            - paragraph [ref=e758]:
              - text: The behavior of
              - code [ref=e759]: gc.collect()
              - text: "changes slightly:"
            - list [ref=e760]:
              - listitem [ref=e761]:
                - paragraph [ref=e762]:
                  - code [ref=e763]: gc.collect(1)
                  - text: ": Performs an increment of garbage collection, rather than collecting generation 1."
              - listitem [ref=e764]:
                - paragraph [ref=e765]:
                  - text: Other calls to
                  - code [ref=e766]: gc.collect()
                  - text: are unchanged.
            - paragraph [ref=e767]:
              - text: (Contributed by Mark Shannon in
