                - text: of Python functions, which is currently not implemented in CPython.
              - paragraph [ref=e363]: This new interpreter type is an internal implementation detail of the CPython interpreter. It doesn’t change the visible behavior of Python programs at all. It can improve their performance, but doesn’t change anything else.
