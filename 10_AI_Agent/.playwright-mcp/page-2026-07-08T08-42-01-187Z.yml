            - text: . To understand the complete implementation and design rationale for a change, refer to the PEP for a particular new feature; but note that PEPs usually are not kept up-to-date once a feature has been fully implemented. See
            - link "Porting to Python 3.14" [ref=e66] [cursor=pointer]:
