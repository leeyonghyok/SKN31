            - paragraph [ref=e5110]:
              - text: The official macOS and Windows release binaries now include an
              - emphasis [ref=e5111]: experimental
              - text: just-in-time (JIT) compiler. Although it is
              - strong [ref=e5112]: not
              - text: recommended for production use, it can be tested by setting
              - link "PYTHON_JIT=1" [ref=e5113] [cursor=pointer]:
                - /url: ../using/cmdline.html#envvar-PYTHON_JIT
                - code [ref=e5114]: PYTHON_JIT=1
              - text: as an environment variable. Downstream source builds and redistributors can use the
              - link "--enable-experimental-jit=yes-off" [ref=e5115] [cursor=pointer]:
                - /url: ../using/configure.html#cmdoption-enable-experimental-jit
                - code [ref=e5116]: "--enable-experimental-jit=yes-off"
              - text: configuration option for similar behavior.
            - paragraph [ref=e5117]:
              - text: The JIT is at an early stage and still in active development. As such, the typical performance impact of enabling it can range from 10% slower to 20% faster, depending on workload. To aid in testing and evaluation, a set of introspection functions has been provided in the
              - link "sys._jit" [ref=e5118] [cursor=pointer]:
                - /url: ../library/sys.html#sys._jit
                - code [ref=e5119]: sys._jit
              - text: namespace.
              - link "sys._jit.is_available()" [ref=e5120] [cursor=pointer]:
                - /url: ../library/sys.html#sys._jit.is_available
                - code [ref=e5121]: sys._jit.is_available()
              - text: can be used to determine if the current executable supports JIT compilation, while
              - link "sys._jit.is_enabled()" [ref=e5122] [cursor=pointer]:
                - /url: ../library/sys.html#sys._jit.is_enabled
                - code [ref=e5123]: sys._jit.is_enabled()
              - text: can be used to tell if JIT compilation has been enabled for the current process.
            - paragraph [ref=e5124]:
              - text: Currently, the most significant missing functionality is that native debuggers and profilers like
              - code [ref=e5125]: gdb
              - text: and
              - code [ref=e5126]: perf
              - text: are unable to unwind through JIT frames (Python debuggers and profilers, like
              - link "pdb" [ref=e5127] [cursor=pointer]:
                - /url: ../library/pdb.html#module-pdb
                - code [ref=e5128]: pdb
              - text: or
              - link "profile" [ref=e5129] [cursor=pointer]:
                - /url: ../library/profile.html#module-profile
                - code [ref=e5130]: profile
              - text: ", continue to work without modification). Free-threaded builds do not support JIT compilation."
            - paragraph [ref=e5131]: Please report any bugs or major performance regressions that you encounter!
