            - paragraph [ref=e356]:
              - text: This feature is opt-in for now. Enabling profile-guided optimization is highly recommended when using the new interpreter as it is the only configuration that has been tested and validated for improved performance. For further information, see
              - link "--with-tail-call-interp" [ref=e357] [cursor=pointer]:
