        - generic [ref=e3858]:
          - heading "CPython bytecode changes" [level=2] [ref=e3859]
          - list [ref=e3860]:
            - listitem [ref=e3861]:
              - paragraph [ref=e3862]:
                - text: Replaced the opcode
                - code [ref=e3863]: BINARY_SUBSCR
                - text: by the
                - link "BINARY_OP" [ref=e3864] [cursor=pointer]:
                  - /url: ../library/dis.html#opcode-BINARY_OP
