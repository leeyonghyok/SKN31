<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>모듈 예제</title>
</head>
<body>
  <!--
    14.3 브라우저에서 모듈 사용하기

    브라우저에서 JavaScript 모듈을 사용하려면
    <script> 태그의 type 속성을 "module"로 지정한다.
  -->

  <!-- 인라인 모듈 스크립트 예제 -->
  <script type="module">
    import { add } from "./math.js";

    console.log(add(10, 20));
  </script>

  <!--
    외부 스크립트에서 모듈 사용하기
    HTML에서는 <script type="module">을 사용하여
    시작 모듈인 JavaScript 파일을 불러올 수 있다.
  -->
  <button id="calculate">계산</button>
  <p id="result"></p>

  <script type="module" src="./main.js"></script>
</body>
</html>
